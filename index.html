<style>

    font-weight: 500;
    font-display: swap;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { margin:0; padding:0; height:100%; overscroll-behavior:none; }
  body {
    margin: 0; padding: 0; height:100%; overscroll-behavior:none;
    background: #10181c;
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
    display: flex; align-items: center; justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  #wrap {
    width: 100%; height: 100%;
    display:flex; align-items:center; justify-content:center;
  }
  #stage {
    position: relative;
    width: 100%;
    background: #62b7e8;
    border: 4px solid #161616;
    border-radius: 22px;
    box-shadow: 0 8px 0 rgba(0,0,0,0.25);
    overflow: hidden;
    touch-action: none;
  }
  .screen {
    position: absolute; inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
  }
  .screen.active { display: flex; }

  /* ---------- Select screen ---------- */
  #screen-select {
    background-color: #20b4e0;
    background-image: url('assets/grass_mobile.png');
    background-repeat: repeat-x;
    background-position: bottom center;
    background-size: auto 50%;
    padding: 5% 6%;
    justify-content: flex-start;
  }
  .sun { position: absolute; top: 3%; right: 7%; width: 13%; aspect-ratio:1; background:#f5c542; border:3px solid #161616; border-radius:50%; }
  /* persistent sound toggle: sits on #stage itself (not inside any one
     .screen), so it shows on every page - select, game, and result - always
     at the same spot, mirroring the game screen's close (X) button. */
  #soundToggle {
    position:absolute; top:3%; left:4%; z-index:9;
    width: clamp(41px,9.12vw,52px); height: clamp(41px,9.12vw,52px);
    background:#f2ead9; border:3px solid #161616; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    padding:9px; cursor:pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.25);
  }
  #soundToggle img { width:100%; height:100%; display:block; object-fit:contain; }
  #soundToggle:active { transform: translateY(3px) scale(0.96); box-shadow: 0 1px 0 rgba(0,0,0,0.25); }
  .cloud { position:absolute; }
  .cloud img { width:100%; height:100%; display:block; object-fit:contain; }
  .subtitle { margin-top: 6%; font-size: clamp(12px,3.4vw,16px); font-weight:700; color:#161616; text-align:center; }
  .title { margin-top: 2px; font-size: clamp(24px,7.5vw,38px); font-weight:900; color:#161616; letter-spacing:-1px; text-align:center; }
  .char-row {
    margin-top: 7%; width:84%; display:grid; grid-template-columns: repeat(2, 1fr);
    gap: 4%; z-index:2;
  }
  .char-card {
    width: 100%; background:#f2ead9; border:3px solid #161616; border-radius:16px;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
    padding: 8% 4%; cursor:pointer; transition: transform .12s, border-color .12s, box-shadow .12s;
    box-shadow: 0 4px 0 rgba(0,0,0,0.12);
    overflow:hidden; /* safety clip so nothing (e.g. the scaled-up dilli art) can spill past the card */
  }
  .char-card.selected { border-color:#e8794a; border-width:4px; box-shadow: 0 0 0 3px rgba(232,121,74,0.35); transform: translateY(-3px); }
  .char-card .portrait { width:100%; height:16vh; max-height:110px; display:flex; align-items:center; justify-content:center; }
  .char-card .portrait img { max-width:100%; max-height:100%; object-fit:contain; display:block; }
  /* dilli's artwork is a wide, short bat shape, so contain-fit leaves it noticeably
     smaller than the other characters; scale it up a little, but stay inside the card. */
  .char-card[data-id="dilli"] { position:relative; z-index:3; }
  .char-card[data-id="dilli"] .portrait img { transform:scale(1.035); }
  .char-name { margin-top: 5%; font-weight:800; font-size: clamp(12px,3.2vw,16px); color:#161616; }
  .pillbtn {
    margin-top: 5%; padding: 3.4% 8%; font-size: clamp(14px,3.6vw,20px); font-weight:800; color:#fff;
    background:#e8794a; border:3px solid #161616; border-radius:40px; cursor:pointer;
    box-shadow: 0 5px 0 #b5502a; transition: transform .08s, box-shadow .08s;
    z-index: 2;
  }
  .pillbtn:active { transform: translateY(4px); box-shadow: 0 1px 0 #b5502a; }
  .pillbtn.blue { background:#4f74e0; box-shadow:0 5px 0 #33449c; }
  .pillbtn.blue:active { box-shadow: 0 1px 0 #33449c; }
  #startBtn {
    margin-top: 7%; padding: 0; border: none; background: none; cursor: pointer;
    width: 63.8%; max-width:308px; z-index: 2;
    transition: transform .08s;
  }
  #startBtn img { width:100%; height:auto; display:block; }
  #startBtn:active { transform: translateY(4px) scale(0.98); }
  .info-open-link {
    margin-top:4%; font-family:'GMarketSans','Apple SD Gothic Neo',sans-serif; font-weight:500;
    font-size: clamp(14.4px,4.08vw,18px); color:#FFFFFF; text-decoration:underline;
    cursor:pointer; z-index:2; opacity:0.92;
  }
  .info-open-link:active { opacity:0.6; }

  /* ---------- Game info / tutorial overlay ---------- */
  .info-overlay {
    position:absolute; inset:0; z-index:50;
    background: rgba(0,0,0,0.9);
    display:none; flex-direction:column; align-items:center;
    padding-top: calc(33.3% + 100px);
    touch-action:none;
  }
  .info-overlay.active { display:flex; }
  #infoCloseBtn {
    position:absolute; top:3%; right:4%; z-index:52;

    background:#f2ead9; border:3px solid #161616; border-radius:50%;

  .info-dots .dot.active { background:#fff; }
  .info-track-wrap { width:100%; flex:1; overflow:hidden; touch-action:pan-y; }

  .info-page-num {

  .info-gif.page1 { width:92.8%; max-width:333px; align-self:flex-end; }
  /* page 2: original size, then scaled down to 70%, docked flush left */
  .info-gif.page2 { width:54.6%; max-width:196px; align-self:flex-start; }
  /* page 3: centered, pushed further down by 2x the base gap (6% -> 18%) */
  .info-gif.page3 { width:54.6%; max-width:196px; align-self:center; margin-top:18%; }

  /* ---------- Game screen ---------- */
  #screen-game { justify-content:flex-start; }
  #gameCanvas { width:100%; height:100%; display:block; touch-action:none; }
  .hud { position:absolute; top:3%; left:50%; transform:translateX(-50%); display:flex; gap:2.5vw; z-index:5; }

    position:absolute; top:3%; right:4%; z-index:6;

  .pickup-btn img { width:100%; height:100%; display:block; }
  .pickup-btn:active { transform:scale(0.92); }
  /* one-shot hint icon next to the pickup button: blinks 3 times then stays
     hidden. Because #screen-game is display:none until a stage starts, this
     animation restarts fresh every time the game screen becomes visible. */
  .pickup-hint {
    flex-shrink:0; height:12vw; max-height:54px; width:auto;
    margin-left:4%; opacity:0; pointer-events:none;
    /* 5 quick blinks (0 - 2.5s), then holds fully visible for 3s
       (2.5s - 5.5s), then fades out smoothly over the last 1s. */
    animation: pickupHintBlink 6.5s linear 1;
    animation-fill-mode: forwards;
  }
  @keyframes pickupHintBlink {
    0%     { opacity:0; }
    0.77%  { opacity:1; }
    4.62%  { opacity:1; }
    5.38%  { opacity:0; }
    8.46%  { opacity:0; }
    9.23%  { opacity:1; }
    13.08% { opacity:1; }
    13.85% { opacity:0; }
    16.92% { opacity:0; }
    17.69% { opacity:1; }
    21.54% { opacity:1; }
    22.31% { opacity:0; }
    25.38% { opacity:0; }
    26.15% { opacity:1; }
    30.00% { opacity:1; }
    30.77% { opacity:0; }
    33.85% { opacity:0; }
    34.62% { opacity:1; }
    38.46% { opacity:1; }  /* 5th blink settles on */
    84.62% { opacity:1; }  /* held fully visible for 3s */
    100%   { opacity:0; }  /* smooth 1s fade-out */
  }

  #screen-result.is-fail .confetti-bg,

  .result-title { font-size: clamp(20px,6.5vw,32px); font-weight:900; color:#161616; text-align:center; }
  .result-sub { margin-top:2%; font-size: clamp(12px,3.6vw,16px); font-weight:700; color:#222; text-align:center; position:relative; z-index:1; }

     of how tall the title/sub text above it ends up being. aspect-ratio

     synchronously during layout, so this doesn't depend on image load
     timing the way a height:auto <img> would. */
  .scoreboard {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:82%; max-width:360px; aspect-ratio: 731 / 305; z-index:1;
  }
  .scoreboard img { width:100%; height:100%; display:block; object-fit:contain; }
  .scoreboard-text {
    position:absolute; left:4%; right:4%; top:8.9%; bottom:23.9%;
    display:flex; align-items:center; justify-content:center;
  }
  .scoreboard-text span { font-family: 'GMarketSans', 'Courier New', monospace; font-weight:700; font-size: clamp(22px,7.5vw,44px); letter-spacing:1px; }
  .scoreboard-text .num { color:#f5d94a; text-shadow:0 0 8px rgba(245,217,74,.6); }
  .scoreboard-text .ok { color:#f0603f; margin-left:6px; }
  /* top is set dynamically in JS to sit just below the (always vertically
     centered) scoreboard, shifted down by however far the scoreboard had
     to move to reach the screen's middle. */
  .btn-row { display:flex; flex-direction:column; gap:2.5vh; z-index:1; position:absolute; left:50%; transform:translateX(-50%); align-items:center; width:70%; }
  .img-btn { padding:0; border:none; background:none; cursor:pointer; width:100%; max-width:280px; transition: transform .08s; }
  .img-btn img { width:100%; height:auto; display:block; }
  .img-btn:active { transform: translateY(4px) scale(0.98); }
</style>

<script>
(function(){
"use strict";

/* ---- Defensive sizing: don't rely solely on CSS aspect-ratio ----
   Portrait phones are tall, so we fit height-first and derive width from
   the 9:16 target ratio, falling back to width-first if the viewport is
   unusually wide/short (e.g. a rotated tablet). */
const STAGE_RATIO = 9/16; // width / height
function fitStage(){
  const wrapEl = document.getElementById('wrap');
  const stageEl = document.getElementById('stage');
  if(!wrapEl || !stageEl) return;
  const availW = wrapEl.clientWidth || window.innerWidth;
  const availH = wrapEl.clientHeight || window.innerHeight;
  let h = availH;
  let w = h * STAGE_RATIO;
  if(w > availW){ w = availW; h = w / STAGE_RATIO; }
  w = Math.max(240, w);
  h = Math.max(426, h);
  stageEl.style.width = w + 'px';
  stageEl.style.height = h + 'px';
}
fitStage();
window.addEventListener('resize', fitStage);
window.addEventListener('orientationchange', fitStage);

/* ================= Audio: background music + sound effects =================
   Mobile browsers block audio autoplay until the user actually interacts
   with the page, so music only starts on the first tap/click anywhere.
   intro.mp3 plays on the select/result (menu-like) screens, game.mp3 plays
   during actual gameplay; the persistent speaker icon lets the player
   mute/unmute at any time. */
let soundOn = true;
let audioUnlocked = false;

const introMusic = new Audio('assets/intro.mp3');
introMusic.loop = true;
introMusic.volume = 0.45;

const gameMusic = new Audio('assets/game.mp3');
gameMusic.loop = true;
gameMusic.volume = 0.45;

// which track belongs to which screen ('result' shares the intro/menu music)
const SCREEN_MUSIC = { select: introMusic, result: introMusic, game: gameMusic };
let currentMusic = null;

function setScreenMusic(screenName){
  const track = SCREEN_MUSIC[screenName] || null;
  if(track === currentMusic){
    if(track && soundOn && audioUnlocked) track.play().catch(()=>{});
    return;
  }
  if(currentMusic){ currentMusic.pause(); }
  currentMusic = track;
  if(currentMusic && soundOn && audioUnlocked){
    currentMusic.currentTime = 0;
    currentMusic.play().catch(()=>{});
  }
}

function playSfx(src, vol){
  if(!soundOn) return;
  try{
    const a = new Audio(src);
    a.volume = vol!=null ? vol : 0.6;
    a.play().catch(()=>{});
  }catch(err){}
}

/* ---- Web Audio API for the frequent, in-loop SFX (trash pickup / puddle
   splash) ----------------------------------------------------------------
   Firing `new Audio(src).play()` on every pickup/puddle hit (playSfx above)
   forces the browser to decode that mp3 from scratch each time, which can
   cause a brief hitch/stutter right in the middle of the game loop. Instead,
   decode each SFX into an in-memory buffer once up front, then trigger
   playback through an AudioBufferSourceNode - scheduling a pre-decoded
   buffer is essentially instant and doesn't block the main thread. */
let audioCtx = null;
const sfxBuffers = {};
function initAudioContext(){
  if(audioCtx) return audioCtx;
  const AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return null;
  try{ audioCtx = new AC(); }catch(err){ audioCtx = null; }
  return audioCtx;
}
function loadSfxBuffer(name, url){
  const ctx = initAudioContext();
  if(!ctx) return;
  fetch(url)
    .then(r=>r.arrayBuffer())
    .then(data=>ctx.decodeAudioData(data))
    .then(buf=>{ sfxBuffers[name] = buf; })
    .catch(()=>{});
}
loadSfxBuffer('get', 'assets/get.mp3');
loadSfxBuffer('pool', 'assets/pool.mp3');

// iOS (Safari/WKWebView) mixes the Web Audio API graph quieter than a
// concurrently-playing <audio> element, so buffer-based SFX end up sounding
// noticeably softer than on Android/Chrome. Boost only on iOS so Galaxy/
// other devices - where the volume is already right - stay untouched.
const isIOS = /iP(hone|od|ad)/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
const IOS_SFX_BOOST = 1.6;

function playSfxBuffer(name, vol){
  if(!soundOn) return;
  const buf = sfxBuffers[name];
  const baseVol = vol!=null ? vol : 0.6;
  if(!audioCtx || !buf){
    // buffer not decoded yet (e.g. very first moments after page load) -
    // fall back to the plain Audio() path just this once.
    playSfx(`assets/${name}.mp3`, baseVol);
    return;
  }
  try{
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const gain = audioCtx.createGain();
    gain.gain.value = isIOS ? baseVol * IOS_SFX_BOOST : baseVol;
    src.connect(gain).connect(audioCtx.destination);
    src.start(0);
  }catch(err){}
}

function unlockAudio(){
  if(audioUnlocked) return;
  audioUnlocked = true;
  if(audioCtx && audioCtx.state === 'suspended'){ audioCtx.resume().catch(()=>{}); }
  if(soundOn && currentMusic){ currentMusic.play().catch(()=>{}); }
}

}

/* ================= Constants =================
   Portrait canvas: narrower (0.6x) and taller (1.6x) than the desktop
   900x600 version. K scales "near-field" pixel sizes (sprites/objects)
   for the taller canvas; road half-widths scale with the narrower width. */
const CW=540, CH=960;
const K = 1.6;
const GRASS_COLOR = '#5ba34c';
const HORIZON_Y=300, PLAYER_Y=760;
const ROAD_HALF_FAR=54, ROAD_HALF_NEAR=288;
const FAR_SCALE=0.30, NEAR_SCALE=1.0;
const TIME_LIMIT=40;

const STAGES=[
  { target:150, trashInterval:0.70, puddleInterval:2.0, travelDuration:2.5 },
  { target:250, trashInterval:0.60, puddleInterval:1.4,  travelDuration:2.2 },
  { target:400, trashInterval:0.52, puddleInterval:1.0,  travelDuration:1.9 },
];

function project(z, relX){
  const y = HORIZON_Y + z*(PLAYER_Y-HORIZON_Y);
  const scale = FAR_SCALE + z*(NEAR_SCALE-FAR_SCALE);
  const roadHalf = ROAD_HALF_FAR + z*(ROAD_HALF_NEAR-ROAD_HALF_FAR);
  const x = CW/2 + relX*roadHalf*0.85;
  return {x,y,scale};
}

/* In-place array compaction - avoids allocating a brand-new array every
   frame the way .filter() does. With stage 3's faster spawn rates this
   cuts down on per-frame garbage and the resulting micro-stutter/GC pauses
   that were most noticeable right when picking up trash or hitting a puddle. */
function filterInPlace(arr, keepFn){
  let w = 0;
  for(let i=0;i<arr.length;i++){
    if(keepFn(arr[i])) arr[w++] = arr[i];
  }
  arr.length = w;
}

/* ---------- input: touch/pointer (primary mobile control) -------------
   Drag left/right anywhere on the game screen to move the character;
   tap the pickup button to collect trash. */
const DRAG_SENSITIVITY = 2.4;   // full-screen-width drag ~= full -1..1 range
let ptrActive=false, ptrId=null, ptrStartX=0, ptrStartPlayerX=0;

const gameScreenEl = document.getElementById('screen-game');
const pickupBtnEl = document.getElementById('pickupBtn');

gameScreenEl.addEventListener('pointerdown', (e)=>{
  if(!G || G.inputLocked) return;
  if(e.target && e.target.closest && e.target.closest('#pickupBtn, #closeBtn')) return;
  ptrActive = true; ptrId = e.pointerId;
  ptrStartX = e.clientX; ptrStartPlayerX = G.playerX;
  try{ gameScreenEl.setPointerCapture(e.pointerId); }catch(err){}
  e.preventDefault();
});

gameScreenEl.addEventListener('pointermove', (e)=>{
  if(!ptrActive || e.pointerId!==ptrId || !G || G.inputLocked) return;
  const dx = e.clientX - ptrStartX;
  const screenW = gameScreenEl.clientWidth || 1;
  const relXDelta = (dx / screenW) * DRAG_SENSITIVITY;
  G.playerX = Math.max(-1, Math.min(1, ptrStartPlayerX + relXDelta));
  e.preventDefault();
});

function endSwipePointer(e){
  if(!ptrActive || e.pointerId!==ptrId) return;
  ptrActive = false;
}
gameScreenEl.addEventListener('pointerup', endSwipePointer);
gameScreenEl.addEventListener('pointercancel', endSwipePointer);

pickupBtnEl.addEventListener('pointerdown', (e)=>{
  e.preventDefault();
  e.stopPropagation();
  if(!G || G.inputLocked) return;
  tryCollect();
});

function tryCollect(){
  let best=null, bestD=999;
  for(const t of G.trash){
    if(t.z>=0.82 && t.z<=1.08){
      const d = Math.abs(t.relX - G.playerX);
      if(d<0.40 && d<bestD){ best=t; bestD=d; }
    }
  }
  if(best){
    best.collected=true;
    G.score += 10;
    const p = project(best.z, best.relX);
    G.popups.push({x:p.x, y:p.y, life:0.7, text:'+10'});
    playSfxBuffer('get', 0.6);
  }
}

/* ---------- update ---------- */
function update(dt){
  const cfg = G.cfg;
  const worldSpeed = 1/cfg.travelDuration;

  // input lock timer
  if(G.inputLocked){
    G.lockTimer -= dt;
    if(G.lockTimer<=0){ G.inputLocked=false; G.keyLeft=false; G.keyRight=false; }
  }

  // player movement (keyboard fallback; touch drag sets G.playerX directly)
  const moveSpeed = 1.9;
  if(G.keyLeft && !G.inputLocked) G.playerX -= moveSpeed*dt;
  if(G.keyRight && !G.inputLocked) G.playerX += moveSpeed*dt;
  G.playerX = Math.max(-1, Math.min(1, G.playerX));
  G.bob += dt* (G.keyLeft||G.keyRight||ptrActive?9:4);

  // spawn trash
  G.trashTimer -= dt;
  if(G.trashTimer<=0){
    G.trash.push({relX:(Math.random()*1.7-0.85), z:0, variant:Math.floor(Math.random()*trashImages.length), collected:false});
    G.trashTimer = cfg.trashInterval * (0.75+Math.random()*0.6);
  }
  // spawn puddle
  G.puddleTimer -= dt;
  if(G.puddleTimer<=0){
    G.puddles.push({relX:(Math.random()*1.6-0.8), z:0, hit:false});
    G.puddleTimer = cfg.puddleInterval * (0.75+Math.random()*0.6);
  }

  // advance trash
  for(const t of G.trash) t.z += worldSpeed*dt;
  filterInPlace(G.trash, t=> !t.collected && t.z<1.1);

  // advance puddles + collision
  for(const p of G.puddles){
    p.z += worldSpeed*dt;
    if(!p.hit && !G.inputLocked && p.z>=0.85 && p.z<=1.05){
      const d = Math.abs(p.relX - G.playerX);
      if(d<0.26){
        p.hit=true;
        G.inputLocked=true; G.lockTimer=2.0; G.keyLeft=false; G.keyRight=false;
        G.splash=0.5;
        const pp = project(p.z, p.relX);
        G.popups.push({x:pp.x, y:pp.y-10, life:0.8, text:'첨벙!'});
        playSfxBuffer('pool', 0.6);
      }
    }
  }
  filterInPlace(G.puddles, p=> p.z<1.1);

  // trees - spawned on a timer and advanced/removed exactly like trash, so both
  // travel down the road at the identical rate (worldSpeed) and lifespan (z<1.1).
  const treeInterval = cfg.travelDuration * 0.45;
  G.treeTimerL -= dt;
  if(G.treeTimerL<=0){
    G.trees.push({side:-1, z:0, jit:(Math.random()-0.5)*0.25, size:0.8+Math.random()*0.5, variant:randomTreeVariant()});
    G.treeTimerL = treeInterval * (0.8+Math.random()*0.4);
  }
  G.treeTimerR -= dt;
  if(G.treeTimerR<=0){
    G.trees.push({side:1, z:0, jit:(Math.random()-0.5)*0.25, size:0.8+Math.random()*0.5, variant:randomTreeVariant()});
    G.treeTimerR = treeInterval * (0.8+Math.random()*0.4);
  }
  for(const t of G.trees) t.z += worldSpeed*dt;
  filterInPlace(G.trees, t=> t.z<1.1);

  // popups
  for(const pu of G.popups) pu.life -= dt;
  filterInPlace(G.popups, pu=>pu.life>0);

  if(G.splash>0) G.splash-=dt;

  // timer
  G.timeLeft -= dt;
  if(G.timeLeft<=0){
    G.timeLeft=0;
    endStage();
  }

  hudScore.textContent = `${G.score} / ${cfg.target}`;
  hudTime.textContent = `${Math.ceil(G.timeLeft)} 초`;
}

function endStage(){
  if(G.ended) return;
  G.ended = true;
  stopGame_KeepState();
  const success = lastResult.score >= lastResult.target;
  showResult(success);

/* ---------- drawing ---------- */
function drawBackground(){
  // sky
  const skyGrad = ctx.createLinearGradient(0,0,0,HORIZON_Y);
  skyGrad.addColorStop(0,'#5fb3ea');
  skyGrad.addColorStop(1,'#8fd0f0');
  ctx.fillStyle=skyGrad;
  ctx.fillRect(0,0,CW,HORIZON_Y);
  // sun
  ctx.fillStyle='#f5c542';
  ctx.strokeStyle='#161616'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(CW-70,90,48,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // clouds
  drawCloudImg(0,90,70,90);
  drawCloudImg(1,CW-140,140,70);
  // grass
  ctx.fillStyle = GRASS_COLOR;
  ctx.fillRect(0,HORIZON_Y,CW,CH-HORIZON_Y);
  // road
  ctx.beginPath();
  ctx.moveTo(CW/2-ROAD_HALF_FAR,HORIZON_Y);
  ctx.lineTo(CW/2+ROAD_HALF_FAR,HORIZON_Y);
  ctx.lineTo(CW/2+ROAD_HALF_NEAR,CH);
  ctx.lineTo(CW/2-ROAD_HALF_NEAR,CH);
  ctx.closePath();
  ctx.fillStyle='#dec9a0';
  ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=2; ctx.stroke();
  // horizon line
  ctx.strokeStyle='#161616'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,HORIZON_Y); ctx.lineTo(CW,HORIZON_Y); ctx.stroke();
}
function drawCloudImg(idx, x, y, w){
  const img = cloudImages[idx];
  if(!img || !img.complete || img.naturalWidth===0) return;
  const h = w * (img.naturalHeight/img.naturalWidth);
  ctx.drawImage(img, x-w/2, y-h/2, w, h);
}

function drawTree(t){
  const relX = (t.side)*(1.28) + t.jit;
  // z is NOT clamped here - see the desktop version for why (avoids trees
  // visually freezing/piling up near the player).
  const p = project(t.z, relX);
  if(p.y - HORIZON_Y > (CH - HORIZON_Y) * 1.6) return;
  const s = p.scale * t.size;
  const img = treeImages[t.variant] || treeImages[0];
  if(!img || !img.complete || img.naturalWidth===0) return;
  const h = 130 * K;
  const w = h * (img.naturalWidth/img.naturalHeight);
  ctx.save();
  ctx.translate(p.x,p.y);
  ctx.scale(s,s);
  ctx.drawImage(img, -w/2, -h, w, h);
  ctx.restore();
}

const PUDDLE_SCALE = 1.5 * K;
function drawPuddle(p){
  const proj = project(Math.min(p.z,1.05), p.relX);
  const s = proj.scale * PUDDLE_SCALE;
  ctx.save();
  ctx.translate(proj.x, proj.y);
  ctx.scale(s,s);
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.ellipse(0,4,40,16,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#5fb3d6';
  ctx.strokeStyle='#2c7fa3'; ctx.lineWidth=2/s;
  ctx.beginPath(); ctx.ellipse(0,0,34,13,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=2/s;
  ctx.beginPath(); ctx.ellipse(-4,-2,14,5,0,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

const TRASH_SCALE = 2 * K; // "2x bigger" (desktop request), plus K for the taller canvas
const TRASH_BASE_H = 30;
function drawTrash(t){
  const proj = project(Math.min(t.z,1.06), t.relX);
  const s = proj.scale;
  const img = trashImages[t.variant] || trashImages[0];
  if(!img || !img.complete || img.naturalWidth===0) return;
  const h = TRASH_BASE_H * TRASH_SCALE;
  const w = h * (img.naturalWidth/img.naturalHeight);
  ctx.save();
  ctx.translate(proj.x, proj.y);
  ctx.scale(s,s);
  ctx.drawImage(img, -w/2, -h, w, h);
  ctx.restore();
}

const PLAYER_SPRITE_H = 210 * K;

function drawPlayer(){
  const c = CHARACTERS.find(c=>c.id===G.charId);
  const img = backImages[c.id];
  const relX = G.playerX;
  const px = CW/2 + relX*ROAD_HALF_NEAR*0.85;
  const py = PLAYER_Y;
  const bobY = G.inputLocked ? 0 : Math.sin(G.bob)*4;

  // shadow
  ctx.save();
  ctx.translate(px, py + bobY);
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(0,10,36,10,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  const spriteH = PLAYER_SPRITE_H * (c.scale || 1);

  if(img && img.complete && img.naturalWidth>0){
    const h = spriteH;
    const w = h * (img.naturalWidth/img.naturalHeight);
    const tilt = G.inputLocked ? 0 : Math.sin(G.bob*1.3)*0.035;
    ctx.save();
    ctx.translate(px, py + bobY);
    ctx.rotate(tilt);
    ctx.drawImage(img, -w/2, -h, w, h);
    ctx.restore();
  }

  if(G.inputLocked){
    ctx.save();
    ctx.translate(px, py - spriteH - 10);
    ctx.font='28px sans-serif';
    ctx.textAlign='center';
    const spin = G.bob*3;
    for(let i=0;i<3;i++){
      const a = spin + i*(Math.PI*2/3);
      ctx.fillText('💧', Math.cos(a)*24, Math.sin(a)*12);
    }
    ctx.restore();
  }
}

function drawPopups(){
  ctx.textAlign='center';
  for(const p of G.popups){
    const alpha = Math.max(0,p.life/0.7);
    ctx.globalAlpha = alpha;
    const isScore = p.text==='+10';
    ctx.fillStyle = isScore ? '#f5d94a' : '#5fb3d6';
    ctx.strokeStyle='#161616'; ctx.lineWidth = isScore ? 6 : 3;
    ctx.font = isScore ? 'bold 52px sans-serif' : 'bold 26px sans-serif';
    const yOff = (0.7-p.life)*36;
    ctx.strokeText(p.text, p.x, p.y-yOff);
    ctx.fillText(p.text, p.x, p.y-yOff);
    ctx.globalAlpha = 1;
  }
}

function render(){
  ctx.clearRect(0,0,CW,CH);
  drawBackground();
  const treesSorted = [...G.trees].sort((a,b)=>a.z-b.z);
  for(const t of treesSorted) drawTree(t);
  for(const p of G.puddles) drawPuddle(p);
  const trashSorted = [...G.trash].sort((a,b)=>a.z-b.z);
  for(const t of trashSorted) drawTrash(t);
  drawPlayer();
  drawPopups();
}

/* ---------- main loop ---------- */
function loop(now){
  if(!G) return;
  let dt = (now-lastT)/1000;
  lastT = now;
  dt = Math.min(dt, 0.05);
  update(dt);
  render();
  if(G && !G.ended){
    rafId = requestAnimationFrame(loop);
  }
}

})();
</script>
</body>
</html>
